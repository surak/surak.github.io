<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>POTATO ME HARD</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  body {
    background: #0a0a0a;
    overflow: hidden;
    font-family: 'Impact', 'Arial Black', sans-serif;
    height: 100vh;
    width: 100vw;
    position: relative;
    animation: thump 1.5s infinite;
  }
  @keyframes thump {
    0%, 100% { transform: scale(1); }
    10% { transform: scale(1.03); }
    20% { transform: scale(1); }
  }
  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  .title {
    position: fixed;
    top: 8%;
    width: 100%;
    text-align: center;
    font-size: 8vw;
    color: #FFD700;
    text-shadow: 0 0 20px #FFA500, 0 0 40px #FF4500, 4px 4px 0px #8B4513;
    z-index: 10;
    letter-spacing: 4px;
    animation: shake 0.5s infinite;
  }
  @keyframes shake {
    0% { transform: translate(1px, 1px) rotate(0deg); }
    10% { transform: translate(-1px, -2px) rotate(-1deg); }
    20% { transform: translate(-3px, 0px) rotate(1deg); }
    30% { transform: translate(3px, 2px) rotate(0deg); }
    40% { transform: translate(1px, -1px) rotate(1deg); }
    50% { transform: translate(-1px, 2px) rotate(-1deg); }
    60% { transform: translate(-3px, 1px) rotate(0deg); }
    70% { transform: translate(3px, 1px) rotate(-1deg); }
    80% { transform: translate(-1px, -1px) rotate(1deg); }
    90% { transform: translate(1px, 2px) rotate(0deg); }
    100% { transform: translate(1px, -2px) rotate(-1deg); }
  }
  .giant-potato {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 25vw;
    z-index: 5;
    filter: drop-shadow(0 0 30px rgba(255, 165, 0, 0.6));
    animation: potatoPulse 1s infinite ease-in-out, potatoSpin 8s infinite linear;
    cursor: pointer;
    transition: transform 0.1s;
  }
  @keyframes potatoPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.15); }
  }
  @keyframes potatoSpin {
    from { transform: translate(-50%, -50%) rotate(0deg) scale(1.1); }
    to { transform: translate(-50%, -50%) rotate(360deg) scale(1.1); }
  }
  .quote-box {
    position: fixed;
    bottom: 10%;
    width: 100%;
    text-align: center;
    color: #FFE4B5;
    font-size: 2.5vw;
    z-index: 10;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
    padding: 0 20px;
    font-family: 'Georgia', serif;
    font-style: italic;
  }
  .btn {
    position: fixed;
    bottom: 3%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: linear-gradient(45deg, #FF4500, #FFD700);
    border: 3px solid #8B4513;
    color: #3e1c00;
    font-size: 1.5vw;
    font-weight: bold;
    padding: 15px 40px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 3px;
    box-shadow: 0 0 20px rgba(255, 69, 0, 0.5);
    transition: all 0.2s;
    font-family: 'Impact', sans-serif;
  }
  .btn:hover {
    transform: translateX(-50%) scale(1.1);
    box-shadow: 0 0 40px rgba(255, 69, 0, 0.8);
  }
  .hardcore body {
    background: radial-gradient(circle at center, #1a0f00 0%, #0a0a0a 100%);
  }
  .hardcore .title {
    color: #ff3300;
    text-shadow: 0 0 30px #ff0000, 0 0 60px #8B0000, 4px 4px 0px #3e0000;
  }
  .flash {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(255, 215, 0, 0.2);
    pointer-events: none;
    z-index: 50;
    opacity: 0;
  }
</style>
</head>
<body>
<div class="flash" id="flash"></div>
<canvas id="canvas"></canvas>
<div class="title">POTATO ME HARD</div>
<div class="giant-potato" id="giantPotato">🥔</div>
<div class="quote-box" id="quote">"I am become potato, destroyer of fries."</div>
<button class="btn" id="hardcoreBtn">Activate HARDCORE Potato Mode</button>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let w, h;
function resize(){ w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; }
window.addEventListener('resize', resize);
resize();

let potatoes = [];
let particles = [];
let hardcore = false;
let potatoCount = 80;

function createPotato() {
  return {
    x: Math.random() * w,
    y: -50,
    size: Math.random() * 30 + 20,
    speed: Math.random() * 3 + 2,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.1,
    emoji: Math.random() > 0.9 ? '🍟' : (Math.random() > 0.8 ? '🥔' : '🥔')
  };
}

for (let i = 0; i < potatoCount; i++) {
  let p = createPotato();
  p.y = Math.random() * h;
  potatoes.push(p);
}

const quotes = [
  "I am become potato, destroyer of fries.",
  "Boil 'em, mash 'em, stick 'em in your soul.",
  "Resistance is futile. You will be potatoed.",
  "In the beginning, there was potato.",
  "May the starch be with you.",
  "Potato harder than anyone has potatooed before.",
  "You cannot handle the tuber.",
  "One potato to rule them all.",
  "Fry me to the moon, let me play among the starches.",
  "Potato is not a phase. Potato is a lifestyle.",
  "Tuber? I barely knew her!",
  "Harder, better, faster, potato.",
  "Ask not what your potato can do for you...",
  "I potato, therefore I am.",
  "Keep calm and potato on. NO. POTATO HARDER."
];
let quoteIdx = 0;
setInterval(() => {
  quoteIdx = (quoteIdx + 1) % quotes.length;
  document.getElementById('quote').textContent = '"' + quotes[quoteIdx] + '"';
}, 3000);

function spawnExplosion(x, y) {
  for (let i = 0; i < 20; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 15,
      vy: (Math.random() - 0.5) * 15,
      life: 1,
      size: Math.random() * 25 + 10,
      emoji: Math.random() > 0.5 ? '🥔' : '✨'
    });
  }
}

document.addEventListener('click', (e) => {
  if (e.target.id === 'hardcoreBtn') return;
  spawnExplosion(e.clientX, e.clientY);
  const flash = document.getElementById('flash');
  flash.style.opacity = 1;
  setTimeout(() => flash.style.opacity = 0, 80);
});

document.getElementById('hardcoreBtn').addEventListener('click', () => {
  hardcore = !hardcore;
  document.body.classList.toggle('hardcore');
  const btn = document.getElementById('hardcoreBtn');
  if (hardcore) {
    btn.textContent = 'DISENGAGE HARDCORE';
    potatoCount = 200;
    for (let i = 0; i < 120; i++) potatoes.push(createPotato());
  } else {
    btn.textContent = 'Activate HARDCORE Potato Mode';
    potatoCount = 80;
    potatoes = potatoes.slice(0, 80);
  }
});

const giant = document.getElementById('giantPotato');
document.addEventListener('mousemove', (e) => {
  const cx = w / 2, cy = h / 2;
  const dx = (e.clientX - cx) / cx;
  const dy = (e.clientY - cy) / cy;
  giant.style.transform = `translate(-50%, -50%) perspective(500px) rotateY(${dx * 30}deg) rotateX(${-dy * 30}deg) scale(1.2)`;
});

function animate() {
  ctx.clearRect(0, 0, w, h);
  
  if (hardcore) {
    ctx.fillStyle = 'rgba(255, 69, 0, 0.15)';
    ctx.fillRect(0, 0, w, h);
  }
  
  ctx.font = '30px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  potatoes.forEach(p => {
    p.y += p.speed * (hardcore ? 2.5 : 1);
    p.rotation += p.rotSpeed;
    if (p.y > h + 50) {
      Object.assign(p, createPotato());
    }
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    ctx.font = `${p.size}px sans-serif`;
    ctx.fillText(p.emoji, 0, 0);
    ctx.restore();
  });
  
  particles.forEach((p, i) => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.3;
    p.life -= 0.02;
    if (p.life <= 0) {
      particles.splice(i, 1);
      return;
    }
    ctx.globalAlpha = p.life;
    ctx.font = `${p.size}px sans-serif`;
    ctx.fillText(p.emoji, p.x, p.y);
  });
  ctx.globalAlpha = 1;
  
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
